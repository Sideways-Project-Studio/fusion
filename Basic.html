<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D-T Fusion Sandbox</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #333; border-radius: 50%; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        #controls { margin-top: 15px; display: flex; gap: 10px; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #00aaff; }
        #stats { margin-top: 10px; font-size: 16px; font-family: monospace; color: #ffcc00; }
        #legend { margin-top: 8px; display: flex; gap: 20px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <canvas id="simCanvas" width="600" height="600"></canvas>
    
    <div id="stats">Plasma Energy: 0 eV</div>

    <div id="legend">
        <span class="legend-item"><span class="legend-dot" style="width:8px;height:8px;background:#ff4444;"></span> Proton</span>
        <span class="legend-item"><span class="legend-dot" style="width:8px;height:8px;background:#888888;"></span> Neutron</span>
        <span class="legend-item"><span class="legend-dot" style="width:14px;height:14px;background:#00ffcc;"></span> Alpha (He-4)</span>
    </div>

    <div id="controls">
        <button onclick="injectHeat()">Inject Heat (Accelerate Fuel)</button>
        <button onclick="resetSim()">Reset Fuel</button>
    </div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;
const radius = 280; // Containment wall radius

let particles = [];

let nextNucleusId = 0;

class Particle {
    constructor(type, x, y, nucleusId) {
        this.type = type;
        this.x = x; this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.nucleusId = nucleusId != null ? nucleusId : -1;
        this.charge = (type === 'p') ? 1 : (type === 'alpha' ? 2 : 0);
        this.color = (type === 'p') ? '#ff4444' : (type === 'n' ? '#888888' : '#00ffcc');
        this.size = (type === 'alpha') ? 8 : 4;
    }
}

function resetSim() {
    particles = [];
    nextNucleusId = 0;

    let total = 30;
    let cols = 6, rows = 5;
    let spacingX = (radius * 2 * 0.8) / (cols + 1);
    let spacingY = (radius * 2 * 0.8) / (rows + 1);
    let startX = cx - radius * 0.8 + spacingX;
    let startY = cy - radius * 0.8 + spacingY;

    let idx = 0;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (idx >= total) break;
            let rx = startX + c * spacingX;
            let ry = startY + r * spacingY;
            let nid = nextNucleusId++;

            if (idx < 15) {
                // Deuterium (1p + 1n)
                particles.push(new Particle('p', rx, ry, nid));
                particles.push(new Particle('n', rx, ry, nid));
            } else {
                // Tritium (1p + 2n)
                particles.push(new Particle('p', rx, ry, nid));
                particles.push(new Particle('n', rx, ry, nid));
                particles.push(new Particle('n', rx, ry, nid));
            }
            idx++;
        }
    }
}

function injectHeat() {
    // Group particles by nucleus and kick each nucleus as a unit
    let nuclei = {};
    particles.forEach(p => {
        if (p.type === 'alpha' || p.nucleusId < 0) return;
        if (!nuclei[p.nucleusId]) nuclei[p.nucleusId] = [];
        nuclei[p.nucleusId].push(p);
    });

    for (let nid in nuclei) {
        let group = nuclei[nid];
        let kickX = (Math.random() - 0.5) * 8;
        let kickY = (Math.random() - 0.5) * 8;
        group.forEach(p => {
            p.vx += kickX + (Math.random() - 0.5) * 1.5;
            p.vy += kickY + (Math.random() - 0.5) * 1.5;
        });
    }

    // Free nucleons (unbound, nucleusId = -1) get individual kicks
    particles.forEach(p => {
        if (p.nucleusId < 0 && p.type !== 'alpha') {
            p.vx += (Math.random() - 0.5) * 8;
            p.vy += (Math.random() - 0.5) * 8;
        }
    });
}

function updatePhysics() {
    // 1. Calculate forces only between particles in DIFFERENT nuclei or unbound
    for (let i = 0; i < particles.length; i++) {
        let p1 = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];

            // Bound nucleons in the same nucleus exert no force on each other
            if (p1.nucleusId >= 0 && p1.nucleusId === p2.nucleusId) continue;

            let dx = p2.x - p1.x;
            let dy = p2.y - p1.y;
            let dist = Math.sqrt(dx*dx + dy*dy) || 0.001;

            let fx = 0; let fy = 0;

            // Coulomb repulsion with Debye screening (electrons neutralise at range)
            if (p1.charge > 0 && p2.charge > 0 && p1.type !== 'alpha' && p2.type !== 'alpha' && dist < 40) {
                let coulomb = 60 / (dist * dist);
                fx -= (dx / dist) * coulomb;
                fy -= (dy / dist) * coulomb;
            }

            // Strong nuclear attraction (short range, only between free nucleons)
            if (dist < 15 && p1.type !== 'alpha' && p2.type !== 'alpha') {
                let nuclear = 12 * Math.exp(-0.08 * dist);
                fx += (dx / dist) * nuclear;
                fy += (dy / dist) * nuclear;
            }

            p1.vx += fx; p1.vy += fy;
            p2.vx -= fx; p2.vy -= fy;
        }
    }

    // 2. Move bound nuclei as rigid bodies (all nucleons share center-of-mass velocity)
    let nuclei = {};
    particles.forEach(p => {
        if (p.nucleusId < 0) return;
        if (!nuclei[p.nucleusId]) nuclei[p.nucleusId] = [];
        nuclei[p.nucleusId].push(p);
    });
    for (let nid in nuclei) {
        let group = nuclei[nid];
        let avgVx = 0, avgVy = 0;
        group.forEach(p => { avgVx += p.vx; avgVy += p.vy; });
        avgVx /= group.length; avgVy /= group.length;
        let comX = 0, comY = 0;
        group.forEach(p => { comX += p.x; comY += p.y; });
        comX /= group.length; comY /= group.length;

        // Check if internal spread has exceeded binding threshold
        let maxSpread = 0;
        group.forEach(p => {
            let d = Math.sqrt((p.x - comX) ** 2 + (p.y - comY) ** 2);
            if (d > maxSpread) maxSpread = d;
        });

        if (maxSpread > 18) {
            // Nucleus breaks apart -- unbind all nucleons
            group.forEach(p => { p.nucleusId = -1; });
        } else {
            // Snap all nucleons to move as one rigid body
            group.forEach(p => { p.vx = avgVx; p.vy = avgVy; });
        }
    }

    // 3. Integrate positions and handle containment walls
    for (let i = 0; i < particles.length; i++) {
        let p1 = particles[i];
        p1.x += p1.vx * 0.1;
        p1.y += p1.vy * 0.1;

        let distFromCenter = Math.sqrt((p1.x - cx)**2 + (p1.y - cy)**2);
        if (distFromCenter > radius) {
            // Bound nucleons bounce with their nucleus (field holds the whole ion)
            // Free neutrons escape -- they have no charge for the field to grip
            let confined = p1.nucleusId >= 0 || p1.charge > 0;
            if (confined) {
                let nx = (p1.x - cx) / distFromCenter;
                let ny = (p1.y - cy) / distFromCenter;
                let dot = p1.vx * nx + p1.vy * ny;
                p1.vx -= 2 * dot * nx;
                p1.vy -= 2 * dot * ny;
                p1.x = cx + nx * (radius - 2);
                p1.y = cy + ny * (radius - 2);
            }
        }
    }

    // 4. Simple Check-and-Trigger Fusion Event
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            let p1 = particles[i]; let p2 = particles[j];
            if (p1.type === 'p' && p2.type === 'p') {
                let dist = Math.sqrt((p2.x - p1.x)**2 + (p2.y - p1.y)**2);
                // Quantum Tunneling Check: Closer they are, higher the lottery chance
                if (dist < 6 && Math.random() < 0.05) { 
                    triggerFusion(p1, p2);
                    return;
                }
            }
        }
    }
}

function triggerFusion(p1, p2) {
    // Find all neighboring fuel components within 20px to absorb into the alpha cluster
    let targets = particles.filter(p => Math.sqrt((p.x - p1.x)**2 + (p.y - p1.y)**2) < 20);
    let protons = targets.filter(p => p.type === 'p');
    let neutrons = targets.filter(p => p.type === 'n');

    // Ensure we have at least standard D-T parts available to burn (2 protons, at least 2 neutrons)
    if (protons.length >= 2 && neutrons.length >= 2) {
        let spawnX = p1.x; let spawnY = p1.y;

        // Clear out the spent reactants
        particles = particles.filter(p => !targets.slice(0, 5).includes(p));

        let alpha = new Particle('alpha', spawnX, spawnY, -1);
        let freeNeutron = new Particle('n', spawnX, spawnY, -1);
        
        // Apply the explosive mass defect velocity kick (Opposite directions)
        let angle = Math.random() * Math.PI * 2;
        freeNeutron.vx = Math.cos(angle) * 35;
        freeNeutron.vy = Math.sin(angle) * 35;
        alpha.vx = -Math.cos(angle) * 7;
        alpha.vy = -Math.sin(angle) * 7;

        particles.push(alpha);
        particles.push(freeNeutron);
    }
}

const EV_SCALE = 100;
const statsEl = document.getElementById('stats');

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Containment Ring
    ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.stroke();

    // Draw Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    });

    // Calculate and display average kinetic energy in eV
    let totalKE = 0;
    let count = 0;
    particles.forEach(p => {
        if (p.type !== 'alpha') {
            totalKE += 0.5 * (p.vx * p.vx + p.vy * p.vy);
            count++;
        }
    });
    let avgEV = count > 0 ? (totalKE / count) * EV_SCALE : 0;

    let label;
    if (avgEV >= 1000) {
        label = (avgEV / 1000).toFixed(2) + ' keV';
    } else {
        label = avgEV.toFixed(1) + ' eV';
    }
    statsEl.textContent = 'Plasma Energy: ' + label + '  (D-T ignition ≈ 10 keV)';
}

function loop() {
    updatePhysics();
    draw();
    requestAnimationFrame(loop);
}

initializeSimulation = resetSim;
resetSim();
loop();
</script>
</body>
</html>
