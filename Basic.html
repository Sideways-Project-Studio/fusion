<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D-T Fusion Sandbox</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #000; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,150,255,0.1); }
        #controls { margin-top: 15px; display: flex; gap: 10px; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #00aaff; }
        #stats { margin-top: 10px; font-size: 16px; font-family: monospace; color: #ffcc00; }
        #legend { margin-top: 8px; display: flex; gap: 20px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <canvas id="simCanvas" width="900" height="900"></canvas>
    
    <div id="stats">Plasma Energy: 0 eV</div>

    <div id="legend">
        <span class="legend-item"><span class="legend-dot" style="width:8px;height:8px;background:#ff4444;"></span> Proton</span>
        <span class="legend-item"><span class="legend-dot" style="width:8px;height:8px;background:#888888;"></span> Neutron</span>
        <span class="legend-item"><span class="legend-dot" style="width:14px;height:14px;background:#00ffcc;"></span> Alpha (He-4)</span>
    </div>

    <div id="controls">
        <button onclick="injectHeat()">Inject Heat (Accelerate Fuel)</button>
        <button onclick="resetSim()">Reset Fuel</button>
    </div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;
const radius = 280;
const B0 = 0.15;
const vesselRadius = 420;

// Yukawa potential: V(r) = -g * exp(-r/λ) / r
// Force: F(r) = g * exp(-r/λ) * (1/r² + 1/(rλ))  (positive = repulsive toward)
const YUKAWA_ATTRACT = 300;   // Attractive well strength
const YUKAWA_RANGE   = 8;     // Pion-exchange range (px)
const CORE_REPULSE   = 804;   // Hard core repulsion strength
const CORE_RANGE     = 2.5;   // Core range (px)
const NUCLEAR_CUTOFF = 25;    // Beyond this, nuclear force negligible
const R_EQUILIBRIUM  = 6;     // Nucleon equilibrium separation (px)

// Coulomb: F = k_c * q1 * q2 / r²
const COULOMB_K      = 88;    // Scaled so barrier requires real energy to overcome
const DEBYE_CUTOFF   = 60;    // Electron screening distance (px)

const DAMPING = 0.98;          // Background radiation cooling (Bremsstrahlung losses)

let particles = [];

let nextNucleusId = 0;

class Particle {
    constructor(type, x, y, nucleusId) {
        this.type = type;
        this.x = x; this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.nucleusId = nucleusId != null ? nucleusId : -1;
        this.charge = (type === 'p') ? 1 : (type === 'alpha' ? 2 : 0);
        this.color = (type === 'p') ? '#ff4444' : (type === 'n' ? '#888888' : '#00ffcc');
        this.size = (type === 'alpha') ? 8 : 4;
    }
}

function resetSim() {
    particles = [];
    nextNucleusId = 0;

    let total = 30;
    let cols = 6, rows = 5;
    let spacingX = (radius * 2 * 0.8) / (cols + 1);
    let spacingY = (radius * 2 * 0.8) / (rows + 1);
    let startX = cx - radius * 0.8 + spacingX;
    let startY = cy - radius * 0.8 + spacingY;

    let idx = 0;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (idx >= total) break;
            let rx = startX + c * spacingX;
            let ry = startY + r * spacingY;
            let nid = nextNucleusId++;

            if (idx < 15) {
                // Deuterium (1p + 1n) at equilibrium separation + initial thermal drift
                let p = new Particle('p', rx - R_EQUILIBRIUM/2, ry, nid);
                let n = new Particle('n', rx + R_EQUILIBRIUM/2, ry, nid);

                let initVx = (Math.random() - 0.5) * 4;
                let initVy = (Math.random() - 0.5) * 4;
                p.vx = initVx; p.vy = initVy;
                n.vx = initVx; n.vy = initVy;

                particles.push(p);
                particles.push(n);
            } else {
                // Tritium (1p + 2n) + initial thermal drift
                let d = R_EQUILIBRIUM * 0.577;
                let p = new Particle('p', rx, ry - d, nid);
                let n1 = new Particle('n', rx - R_EQUILIBRIUM/2, ry + d/2, nid);
                let n2 = new Particle('n', rx + R_EQUILIBRIUM/2, ry + d/2, nid);

                let initVx = (Math.random() - 0.5) * 4;
                let initVy = (Math.random() - 0.5) * 4;
                p.vx = initVx; p.vy = initVy;
                n1.vx = initVx; n1.vy = initVy;
                n2.vx = initVx; n2.vy = initVy;

                particles.push(p);
                particles.push(n1);
                particles.push(n2);
            }
            idx++;
        }
    }
}

function injectHeat() {
    // Group particles by nucleus and kick each nucleus as a unit
    let nuclei = {};
    particles.forEach(p => {
        if (p.type === 'alpha' || p.nucleusId < 0) return;
        if (!nuclei[p.nucleusId]) nuclei[p.nucleusId] = [];
        nuclei[p.nucleusId].push(p);
    });

    for (let nid in nuclei) {
        let group = nuclei[nid];
        let kickX = (Math.random() - 0.5) * 8;
        let kickY = (Math.random() - 0.5) * 8;
        group.forEach(p => {
            p.vx += kickX + (Math.random() - 0.5) * 1.5;
            p.vy += kickY + (Math.random() - 0.5) * 1.5;
        });
    }

    // Free nucleons (unbound, nucleusId = -1) get individual kicks
    particles.forEach(p => {
        if (p.nucleusId < 0 && p.type !== 'alpha') {
            p.vx += (Math.random() - 0.5) * 8;
            p.vy += (Math.random() - 0.5) * 8;
        }
    });
}

function updatePhysics() {
    // 1. Calculate inter-particle forces (all particles feel each other)
    for (let i = 0; i < particles.length; i++) {
        let p1 = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];

            let dx = p2.x - p1.x;
            let dy = p2.y - p1.y;
            let dist = Math.sqrt(dx*dx + dy*dy) || 0.01;

            let fx = 0; let fy = 0;
            let ux = dx / dist, uy = dy / dist;

            // Coulomb: F = k * q1 * q2 / r^2 (with Debye screening)
            if (p1.charge > 0 && p2.charge > 0 && p1.type !== 'alpha' && p2.type !== 'alpha' && dist < DEBYE_CUTOFF) {
                let fc = COULOMB_K * p1.charge * p2.charge / (dist * dist);
                fx -= ux * fc;
                fy -= uy * fc;
            }

            // Yukawa nuclear force (attractive well + repulsive core)
            if (dist < NUCLEAR_CUTOFF && p1.type !== 'alpha' && p2.type !== 'alpha') {
                let expA = Math.exp(-dist / YUKAWA_RANGE);
                let fAttract = YUKAWA_ATTRACT * expA * (1/(dist*dist) + 1/(dist*YUKAWA_RANGE));

                let expC = Math.exp(-dist / CORE_RANGE);
                let fRepulse = CORE_REPULSE * expC * (1/(dist*dist) + 1/(dist*CORE_RANGE));

                let fNuclear = fAttract - fRepulse;
                fx += ux * fNuclear;
                fy += uy * fNuclear;
            }

            // Stable cap to prevent Euler integration explosions
            let netF = Math.sqrt(fx * fx + fy * fy);
            const MAX_FORCE = 150;
            if (netF > MAX_FORCE) {
                fx = (fx / netF) * MAX_FORCE;
                fy = (fy / netF) * MAX_FORCE;
            }

            p1.vx += fx; p1.vy += fy;
            p2.vx -= fx; p2.vy -= fy;
        }

        // Bremsstrahlung radiation cooling
        p1.vx *= DAMPING;
        p1.vy *= DAMPING;
    }

    // 2. Stable 2D Boris Rotator for Magnetic Confinement
    for (let i = 0; i < particles.length; i++) {
        let p1 = particles[i];
        let q = p1.charge;
        if (p1.type === 'alpha') q = 2;

        if (q > 0) {
            let r = Math.sqrt((p1.x - cx)**2 + (p1.y - cy)**2) || 1;
            let rNorm = r / radius;
            let B = B0 * rNorm * rNorm;

            let t = q * B * 0.1;
            let vxOld = p1.vx; let vyOld = p1.vy;
            let denominator = 1 + t * t;

            p1.vx = ((1 - t * t) * vxOld + 2 * t * vyOld) / denominator;
            p1.vy = (-2 * t * vxOld + (1 - t * t) * vyOld) / denominator;
        }
    }

    // 3. Integrate Positions
    for (let i = 0; i < particles.length; i++) {
        let p1 = particles[i];
        p1.x += p1.vx * 0.1;
        p1.y += p1.vy * 0.1;
    }

    // 4. Boundary Removal
    particles = particles.filter(p => {
        let d = Math.sqrt((p.x - cx)**2 + (p.y - cy)**2);
        return d < vesselRadius;
    });

    // 5. Quantum Tunneling & Fusion Check
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            let p1 = particles[i]; let p2 = particles[j];
            if (p1.type === 'p' && p2.type === 'p') {
                let dist = Math.sqrt((p2.x - p1.x)**2 + (p2.y - p1.y)**2);
                if (dist < 6 && Math.random() < 0.05) {
                    triggerFusion(p1, p2);
                    return;
                }
            }
        }
    }
}

function triggerFusion(p1, p2) {
    // Find all neighboring fuel components within 20px to absorb into the alpha cluster
    let targets = particles.filter(p => Math.sqrt((p.x - p1.x)**2 + (p.y - p1.y)**2) < 20);
    let protons = targets.filter(p => p.type === 'p');
    let neutrons = targets.filter(p => p.type === 'n');

    // Ensure we have at least standard D-T parts available to burn (2 protons, at least 2 neutrons)
    if (protons.length >= 2 && neutrons.length >= 2) {
        let spawnX = p1.x; let spawnY = p1.y;

        // Clear out the spent reactants
        particles = particles.filter(p => !targets.slice(0, 5).includes(p));

        let alpha = new Particle('alpha', spawnX, spawnY, -1);
        let freeNeutron = new Particle('n', spawnX, spawnY, -1);
        
        // Apply the explosive mass defect velocity kick (Opposite directions)
        let angle = Math.random() * Math.PI * 2;
        freeNeutron.vx = Math.cos(angle) * 35;
        freeNeutron.vy = Math.sin(angle) * 35;
        alpha.vx = -Math.cos(angle) * 7;
        alpha.vy = -Math.sin(angle) * 7;

        particles.push(alpha);
        particles.push(freeNeutron);
    }
}

const EV_SCALE = 100;
const statsEl = document.getElementById('stats');

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw magnetic field gradient (concentric rings, stronger toward edge)
    for (let r = 70; r <= radius; r += 70) {
        let alpha = 0.04 + 0.12 * (r / radius) * (r / radius);
        ctx.strokeStyle = 'rgba(0,150,255,' + alpha + ')';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    }
    // Vessel wall (physical boundary)
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath(); ctx.arc(cx, cy, vesselRadius, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);

    // Draw Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    });

    // Calculate and display average kinetic energy in eV
    let totalKE = 0;
    let count = 0;
    particles.forEach(p => {
        if (p.type !== 'alpha') {
            totalKE += 0.5 * (p.vx * p.vx + p.vy * p.vy);
            count++;
        }
    });
    let avgEV = count > 0 ? (totalKE / count) * EV_SCALE : 0;

    let label;
    if (avgEV >= 1000) {
        label = (avgEV / 1000).toFixed(2) + ' keV';
    } else {
        label = avgEV.toFixed(1) + ' eV';
    }
    statsEl.textContent = 'Plasma Energy: ' + label + '  (D-T ignition ≈ 10 keV)';
}

function loop() {
    updatePhysics();
    draw();
    requestAnimationFrame(loop);
}

initializeSimulation = resetSim;
resetSim();
loop();
</script>
</body>
</html>
