<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subatomic D-T Fusion Engine Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        #controls {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
            width: 100%;
            max-width: 920px;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        button {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #f3f4f6;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        button:hover {
            background-color: #374151;
            border-color: #4b5563;
        }
        #btnLaunch {
            background-color: #2563eb;
            border-color: #3b82f6;
        }
        #btnLaunch:hover {
            background-color: #1d4ed8;
        }
        canvas {
            background-color: #020617;
            border: 2px solid #1e293b;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
        }
        #legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 18px;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 8px;
            font-size: 13px;
            z-index: 10;
            max-width: 920px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-field {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.6;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .slider-group label {
            white-space: nowrap;
            font-size: 13px;
        }
        .slider-group input[type="range"] {
            width: 120px;
        }
        #speedControls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .speed-btn {
            padding: 4px 8px;
            font-size: 11px;
            min-width: 36px;
        }
        .speed-btn.active {
            background-color: #2563eb;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-row">
            <button id="btnDeuterium">Spawn Deuterium</button>
            <button id="btnTritium">Spawn Tritium</button>
            <button id="btnLaunch" disabled>Smash Ions</button>
            <button id="btnReset">Reset</button>
        </div>
        <div class="control-row">
            <div class="slider-group">
                <label for="kevSlider">Energy: <span id="kevValue">15</span> keV</label>
                <input type="range" id="kevSlider" min="1" max="200" value="15" step="1">
            </div>
            <div class="slider-group">
                <label for="timeSlider">Speed: <span id="timeValue">1.0</span>x</label>
                <input type="range" id="timeSlider" min="0.1" max="4.0" value="1.0" step="0.1">
            </div>
            <div id="speedControls">
                <button class="speed-btn" data-speed="0.25">0.25x</button>
                <button class="speed-btn" data-speed="0.5">0.5x</button>
                <button class="speed-btn active" data-speed="1">1x</button>
                <button class="speed-btn" data-speed="2">2x</button>
                <button class="speed-btn" data-speed="4">4x</button>
            </div>
        </div>
        <div class="control-row">
            <div class="slider-group">
                <label for="deuAngleSlider">D Angle: <span id="deuAngleValue">0</span>&deg;</label>
                <input type="range" id="deuAngleSlider" min="0" max="359" value="0" step="1">
            </div>
            <div class="slider-group">
                <label for="triAngleSlider">T Angle: <span id="triAngleValue">0</span>&deg;</label>
                <input type="range" id="triAngleSlider" min="0" max="359" value="0" step="1">
            </div>
            <div class="slider-group">
                <label for="impactOffsetSlider">Impact Offset: <span id="impactOffsetValue">0.2</span></label>
                <input type="range" id="impactOffsetSlider" min="0" max="2.0" value="0.2" step="0.05">
            </div>
        </div>
        <div class="control-row" style="border-top:1px solid #334155; padding-top:8px; margin-top:2px;">
            <span style="font-size:12px; color:#94a3b8; font-weight:600; letter-spacing:0.5px;">SLOWDOWN</span>
        </div>
        <div class="control-row">
            <div class="slider-group">
                <label for="approachMinSlider">Approach Min: <span id="approachMinValue">5</span>%</label>
                <input type="range" id="approachMinSlider" min="1" max="100" value="5" step="1">
            </div>
            <div class="slider-group">
                <label for="approachRangeSlider">Approach Range: <span id="approachRangeValue">200</span>px</label>
                <input type="range" id="approachRangeSlider" min="50" max="500" value="200" step="10">
            </div>
        </div>
        <div class="control-row">
            <div class="slider-group">
                <label for="fusionMinSlider">Fusion Min: <span id="fusionMinValue">3</span>%</label>
                <input type="range" id="fusionMinSlider" min="1" max="100" value="3" step="1">
            </div>
            <div class="slider-group">
                <label for="fusionRecoverySlider">Fusion Recovery: <span id="fusionRecoveryValue">2</span></label>
                <input type="range" id="fusionRecoverySlider" min="1" max="50" value="2" step="1">
            </div>
        </div>
    </div>

    <canvas id="physicsCanvas" width="900" height="550"></canvas>

    <div id="legend">
        <div class="legend-item">
            <div class="legend-swatch" style="background:#ef4444;"></div>
            <span>Proton (P+)</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background:#3b82f6;"></div>
            <span>Neutron (N0)</span>
        </div>
        <div class="legend-item">
            <div class="legend-field" style="background:#22c55e;"></div>
            <span>Strong Force Field</span>
        </div>
        <div class="legend-item">
            <div class="legend-field" style="background:#ef4444;"></div>
            <span>Coulomb Field</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background:#a855f7;"></div>
            <span>Gamma Photon</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background:#facc15;"></div>
            <span>Alpha (&#8308;He)</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');
        
        let nucleons = [];
        let photons = [];
        
        let deuteriumAssembled = false;
        let tritiumAssembled = false;
        let reactionTriggered = false;
        let fusionOccurred = false;
        let fusionSlowFactor = 1.0;
        let timeScale = 1.0;
        let currentKeV = 15;

        let approachMinDt = 0.05;
        let approachRange = 200;
        let fusionMinDt = 0.03;
        let fusionRecoveryRate = 0.002;
        
        const KE = 1000;
        
        class Nucleon {
            constructor(type, x, y, clusterType) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0; 
                this.ay = 0; 
                this.mass = 1.0; 
                this.charge = (type === 'proton') ? 1.0 : 0.0;
                this.radius = 12;
                this.color = (type === 'proton') ? '#ef4444' : '#3b82f6';
                this.isAlphaComponent = false;
                this.isEjectedNeutron = false;
                this.clusterType = clusterType; 
            }
        
            draw(ctx) {
                ctx.save();
                if (this.charge > 0) {
                    let coulombGrad = ctx.createRadialGradient(this.x, this.y, this.radius, this.x, this.y, 120);
                    coulombGrad.addColorStop(0, 'rgba(239, 68, 68, 0.15)');
                    coulombGrad.addColorStop(1, 'rgba(239, 68, 68, 0)');
                    ctx.beginPath(); ctx.arc(this.x, this.y, 120, 0, Math.PI * 2);
                    ctx.fillStyle = coulombGrad; ctx.fill();
                }
                
                let strongGrad = ctx.createRadialGradient(this.x, this.y, this.radius, this.x, this.y, 18);
                strongGrad.addColorStop(0, 'rgba(34, 197, 94, 0.4)'); 
                strongGrad.addColorStop(1, 'rgba(34, 197, 94, 0)');
                ctx.beginPath(); ctx.arc(this.x, this.y, 18, 0, Math.PI * 2);
                ctx.fillStyle = strongGrad; ctx.fill();
                ctx.restore();
        
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                if (this.isAlphaComponent) this.color = '#facc15';
                ctx.fillStyle = this.color;
                ctx.fill();
        
                ctx.fillStyle = this.isAlphaComponent ? '#1a1a1a' : '#ffffff';
                ctx.font = 'bold 9px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let label = this.type === 'proton' ? 'P+' : 'N0';
                if (this.isAlphaComponent) label = '\u03B1';
                if (this.isEjectedNeutron) label = 'n\u2070';
                ctx.fillText(label, this.x, this.y);
            }
        }
        
        class Photon {
            constructor(x, y, angle) {
                this.x = x; this.y = y; this.speed = 12;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.life = 1.0; this.decay = 0.02;
            }
            update() {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                this.life -= this.decay * timeScale;
            }
            draw(ctx) {
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(this.x, this.y);
                for (let i = 0; i < 6; i++) {
                    let evalX = this.x - (this.vx * i * 0.2);
                    let evalY = this.y - (this.vy * i * 0.2);
                    let waveOffset = Math.sin(Date.now() * 0.05 + i) * 4;
                    let mag = Math.sqrt((-this.vy)**2 + this.vx**2) || 1;
                    ctx.lineTo(evalX + (-this.vy / mag) * waveOffset, evalY + (this.vx / mag) * waveOffset);
                }
                ctx.stroke(); ctx.restore();
            }
        }
        
        document.getElementById('kevSlider').addEventListener('input', (e) => {
            currentKeV = parseFloat(e.target.value);
            document.getElementById('kevValue').innerText = currentKeV;
        });
        
        const setTimeScale = (val) => {
            timeScale = val; document.getElementById('timeSlider').value = val;
            document.getElementById('timeValue').innerText = val.toFixed(1);
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.speed) === val));
        };
        document.getElementById('timeSlider').addEventListener('input', (e) => setTimeScale(parseFloat(e.target.value)));
        document.querySelectorAll('.speed-btn').forEach(b => b.addEventListener('click', () => setTimeScale(parseFloat(b.dataset.speed))));
        document.getElementById('btnReset').addEventListener('click', resetEngineEnvironment);

        document.getElementById('approachMinSlider').addEventListener('input', (e) => {
            approachMinDt = parseFloat(e.target.value) / 100;
            document.getElementById('approachMinValue').innerText = e.target.value;
        });
        document.getElementById('approachRangeSlider').addEventListener('input', (e) => {
            approachRange = parseFloat(e.target.value);
            document.getElementById('approachRangeValue').innerText = e.target.value;
        });
        document.getElementById('fusionMinSlider').addEventListener('input', (e) => {
            fusionMinDt = parseFloat(e.target.value) / 100;
            document.getElementById('fusionMinValue').innerText = e.target.value;
        });
        document.getElementById('fusionRecoverySlider').addEventListener('input', (e) => {
            fusionRecoveryRate = parseFloat(e.target.value) / 1000;
            document.getElementById('fusionRecoveryValue').innerText = e.target.value;
        });

        let deuAngle = 0; let triAngle = 0;
        
        document.getElementById('deuAngleSlider').addEventListener('input', (e) => {
            deuAngle = parseFloat(e.target.value) * Math.PI / 180;
            document.getElementById('deuAngleValue').innerText = e.target.value;
            if (deuteriumAssembled && !reactionTriggered) rotateCluster('D', 180, 275, deuAngle);
        });
        
        document.getElementById('triAngleSlider').addEventListener('input', (e) => {
            triAngle = parseFloat(e.target.value) * Math.PI / 180;
            document.getElementById('triAngleValue').innerText = e.target.value;
            if (tritiumAssembled && !reactionTriggered) rotateCluster('T', 720, 275, triAngle);
        });
        
        document.getElementById('btnDeuterium').addEventListener('click', () => {
            if (deuteriumAssembled) return;
            let cx = 180, cy = 275;
            let r0 = 16.0; // FIXED: Spawns the components much closer together
            
            nucleons.push(new Nucleon('proton', cx - r0, cy, 'D'), new Nucleon('neutron', cx + r0, cy, 'D'));
            deuteriumAssembled = true; 
            rotateCluster('D', cx, cy, deuAngle);
            evalLaunchVerification();
        });
        
        document.getElementById('btnTritium').addEventListener('click', () => {
            if (tritiumAssembled) return;
            let cx = 720, cy = 275;
            let r_equil = 28.5; 
            let h = r_equil * (Math.sqrt(3) / 2);
            
            nucleons.push(
                new Nucleon('proton', cx, cy - (2/3)*h, 'T'),
                new Nucleon('neutron', cx - r_equil/2, cy + (1/3)*h, 'T'),
                new Nucleon('neutron', cx + r_equil/2, cy + (1/3)*h, 'T')
            );
            tritiumAssembled = true; 
            rotateCluster('T', cx, cy, triAngle);
            evalLaunchVerification();
        });
        
        function rotateCluster(clusterType, cx, cy, rad) {
            let filtered = nucleons.filter(n => n.clusterType === clusterType);
            if (clusterType === 'D' && filtered.length === 2) {
                let r0 = 16.0; // FIXED: Synced layout parameter for rotating closer structure
                filtered[0].x = cx - Math.cos(rad) * r0; filtered[0].y = cy - Math.sin(rad) * r0;
                filtered[1].x = cx + Math.cos(rad) * r0; filtered[1].y = cy + Math.sin(rad) * r0;
            } else if (clusterType === 'T' && filtered.length === 3) {
                let r_equil = 28.5, h = r_equil * (Math.sqrt(3) / 2); 
                let points = [{x: 0, y: -(2/3)*h}, {x: -r_equil/2, y: (1/3)*h}, {x: r_equil/2, y: (1/3)*h}];
                filtered.forEach((n, idx) => {
                    let pt = points[idx];
                    n.x = cx + (pt.x * Math.cos(rad) - pt.y * Math.sin(rad));
                    n.y = cy + (pt.x * Math.sin(rad) + pt.y * Math.cos(rad));
                    n.vx = 0; n.vy = 0; n.ax = 0; n.ay = 0;
                });
            }
        }
        
        let impactOffset = 0.2;
        document.getElementById('impactOffsetSlider').addEventListener('input', (e) => {
            impactOffset = parseFloat(e.target.value);
            document.getElementById('impactOffsetValue').innerText = impactOffset.toFixed(2);
        });

        document.getElementById('btnLaunch').addEventListener('click', () => {
            if (!deuteriumAssembled || !tritiumAssembled || reactionTriggered) return;
            let speedFactor = 0.38;
            let computedVelocity = Math.sqrt(currentKeV) * speedFactor;
            nucleons.forEach(n => {
                n.vx = (n.x < canvas.width / 2) ? computedVelocity : -computedVelocity;
                n.vy = (Math.random() - 0.5) * impactOffset;
            });
            reactionTriggered = true;
        });
        
        function evalLaunchVerification() {
            if (deuteriumAssembled && tritiumAssembled) document.getElementById('btnLaunch').disabled = false;
        }
        
        function resetEngineEnvironment() {
            nucleons = []; photons = [];
            deuteriumAssembled = false; tritiumAssembled = false; reactionTriggered = false;
            fusionOccurred = false; fusionSlowFactor = 1.0;
            document.getElementById('btnLaunch').disabled = true;
        }
        
        function mainSimulationEngine() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        
            let minDist = Infinity;
            if (reactionTriggered && nucleons.length >= 2) {
                for (let i = 0; i < nucleons.length; i++) {
                    for (let j = i + 1; j < nucleons.length; j++) {
                        if (nucleons[i].clusterType === nucleons[j].clusterType) continue;
                        let dx = nucleons[i].x - nucleons[j].x;
                        let dy = nucleons[i].y - nucleons[j].y;
                        let d = Math.sqrt(dx * dx + dy * dy);
                        if (d < minDist) minDist = d;
                    }
                }
            }

            const SLOWDOWN_END = 30;
            let adaptiveFactor = 1.0;
            if (reactionTriggered && minDist < approachRange) {
                let t = Math.max(0, (minDist - SLOWDOWN_END) / (approachRange - SLOWDOWN_END));
                adaptiveFactor = approachMinDt + (1.0 - approachMinDt) * (t * t);
            }

            if (fusionOccurred) {
                fusionSlowFactor = Math.min(fusionSlowFactor + fusionRecoveryRate, 1.0);
            }

            let dt = timeScale * adaptiveFactor * fusionSlowFactor;
        
            nucleons.forEach(n => {
                n.x += n.vx * dt + 0.5 * n.ax * dt * dt;
                n.y += n.vy * dt + 0.5 * n.ay * dt * dt;
                n.old_ax = n.ax;
                n.old_ay = n.ay;
                n.ax = 0; 
                n.ay = 0;
            });
        
            for (let i = 0; i < nucleons.length; i++) {
                for (let j = i + 1; j < nucleons.length; j++) {
                    computeInterNucleonForces(nucleons[i], nucleons[j]);
                }
            }
        
             nucleons.forEach(n => {
                if (!reactionTriggered) {
                    let speedSq = n.vx * n.vx + n.vy * n.vy;
                    if (speedSq > 5) {
                        n.vx *= 0.50; 
                        n.vy *= 0.50;
                    } else {
                        n.vx *= 0.82; 
                        n.vy *= 0.82;
                    }
                }
                n.vx += 0.5 * (n.old_ax + n.ax) * dt;
                n.vy += 0.5 * (n.old_ay + n.ay) * dt;
        
                let pad = n.radius;
                if (n.x < pad) { n.x = pad; n.vx *=-0.5; }
                if (n.x > canvas.width - pad) { n.x = canvas.width - pad; n.vx *= -0.5; }
                if (n.y < pad) { n.y = pad; n.vy *= -0.5; }
                if (n.y > canvas.height - pad) { n.y = canvas.height - pad; n.vy *= -0.5; }
            });
        
            evaluateFusionState();
        
            nucleons.forEach(n => n.draw(ctx));
            photons = photons.filter(p => p.life > 0);
            photons.forEach(p => { p.update(); p.draw(ctx); });

            ctx.save();
            ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
            ctx.fillRect(8, 8, 195, 58);
            ctx.strokeStyle = '#334155';
            ctx.strokeRect(8, 8, 195, 58);
            ctx.font = '12px monospace';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'left';
            ctx.fillText(`dt (effective): ${dt.toFixed(4)}`, 16, 26);
            ctx.fillText(`adaptive factor: ${adaptiveFactor.toFixed(4)}`, 16, 42);
            ctx.fillText(`min distance: ${minDist === Infinity ? '---' : minDist.toFixed(1) + ' px'}`, 16, 58);
            ctx.restore();

            requestAnimationFrame(mainSimulationEngine);
        }
        
        function computeInterNucleonForces(n1, n2) {
            let dx = n2.x - n1.x;
            let dy = n2.y - n1.y;
            let r = Math.sqrt(dx * dx + dy * dy);
            if (r < 0.1) return;
        
            let f_coulomb = (KE * n1.charge * n2.charge) / (r * r);
            
            const MU = 0.15;        
            const C_ATTRACT = 850;  
            let expTerm = Math.exp(-MU * r);
            let f_strong_attract = C_ATTRACT * (expTerm / r) * (MU + (1 / r));
            
            // FIXED: Shifted Pauli distribution floor down to 14.0 to yield close-proximity stability
            const QUANTUM_RADIUS = 14.0; 
            const STEEPSET_FACTOR = 0.8; 
            const C_PAULI = 120000;      
            
            let f_pauli_exclusion = C_PAULI / (1.0 + Math.exp((r - QUANTUM_RADIUS) / STEEPSET_FACTOR));
            
            let f_net = f_coulomb + f_pauli_exclusion - f_strong_attract;
        
            const FORCE_LIMIT = 800;
            if (f_net > FORCE_LIMIT) f_net = FORCE_LIMIT;
            if (f_net < -FORCE_LIMIT) f_net = -FORCE_LIMIT;
        
            let fx = (dx / r) * f_net;
            let fy = (dy / r) * f_net;
        
            n1.ax -= fx / n1.mass;
            n1.ay -= fy / n1.mass;
            n2.ax += fx / n2.mass;
            n2.ay += fy / n2.mass;
        }
        
        function evaluateFusionState() {
    if (nucleons.length !== 5) return;

    let avgX = nucleons.reduce((s, n) => s + n.x, 0) / 5;
    let avgY = nucleons.reduce((s, n) => s + n.y, 0) / 5;
    
    // Increased detection spread from 32 to 55 to capture high-speed frames
    let maxSpread = Math.max(...nucleons.map(n => Math.sqrt((n.x - avgX)**2 + (n.y - avgY)**2)));

    if (maxSpread < 55 && !nucleons.some(n => n.isAlphaComponent)) {
        let neutrons = nucleons.filter(n => n.type === 'neutron');
        neutrons.sort((a,b) => ((b.x-avgX)**2 + (b.y-avgY)**2) - ((a.x-avgX)**2 + (a.y-avgY)**2));
        let escapeNeutron = neutrons[0];

        nucleons.forEach(n => {
            let angle = Math.atan2(n.y - avgY, n.x - avgX);
            if (n === escapeNeutron) {
                n.isEjectedNeutron = true;
                // High velocity neutron escape
                n.vx = Math.cos(angle) * 15.0;
                n.vy = Math.sin(angle) * 15.0;
            } else {
                n.isAlphaComponent = true;
                // Form the Helium core
                n.vx = -Math.cos(angle) * 2.0 + (n.x < avgX ? -1.0 : 1.0);
                n.vy = Math.sin(angle) * 1.0;
            }
        });

        // Trigger the visual photon explosion ring
        fusionOccurred = true;
        fusionSlowFactor = fusionMinDt;

        for (let i = 0; i < 16; i++) {
            photons.push(new Photon(avgX, avgY, (i / 16) * Math.PI * 2));
        }
    }
}
        
        mainSimulationEngine();
        </script>
</script>
</body>
</html>
