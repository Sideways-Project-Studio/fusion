<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subatomic D-T Fusion Engine Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        #controls {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
            width: 100%;
            max-width: 920px;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        button {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #f3f4f6;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        button:hover {
            background-color: #374151;
            border-color: #4b5563;
        }
        #btnLaunch {
            background-color: #2563eb;
            border-color: #3b82f6;
        }
        #btnLaunch:hover {
            background-color: #1d4ed8;
        }
        canvas {
            background-color: #020617;
            border: 2px solid #1e293b;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
        }
        #legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 18px;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 8px;
            font-size: 13px;
            z-index: 10;
            max-width: 920px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-field {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.6;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .slider-group label {
            white-space: nowrap;
            font-size: 13px;
        }
        .slider-group input[type="range"] {
            width: 120px;
        }
        .slowdown-section {
            gap: 16px !important;
        }
        .slowdown-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px 10px;
        }
        .slowdown-phase-label {
            font-size: 11px;
            font-weight: 600;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }
        .phase-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .slider-val {
            color: #e2e8f0;
            font-weight: 600;
        }
        .slider-group[title] {
            cursor: help;
        }
        #playbackControls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pb-btn {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 16px;
            border-radius: 6px;
        }
        .pb-btn.active-pause {
            background-color: #b45309;
            border-color: #f59e0b;
        }
        #stepIndicator {
            font-size: 11px;
            color: #64748b;
            font-family: monospace;
            min-width: 70px;
            text-align: center;
        }
        #speedControls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .speed-btn {
            padding: 4px 8px;
            font-size: 11px;
            min-width: 36px;
        }
        .speed-btn.active {
            background-color: #2563eb;
            border-color: #3b82f6;
        }
        #energyGraphContainer {
            width: 100%;
            max-width: 920px;
            margin-top: 14px;
            background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(2,6,23,0.98) 100%);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 16px 16px 10px 16px;
            box-sizing: border-box;
            box-shadow: 0 8px 32px -8px rgba(0,0,0,0.4);
        }
        #energyGraphTitle {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #energyGraphTitle::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #energyCanvas {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            background: #020617;
            display: block;
        }
        #graphLegend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-top: 8px;
            font-size: 11px;
            color: #64748b;
        }
        .graph-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .graph-legend-line {
            width: 18px;
            height: 3px;
            border-radius: 2px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-row">
            <button id="btnDeuterium">Spawn Deuterium</button>
            <button id="btnTritium">Spawn Tritium</button>
            <button id="btnLaunch" disabled>Smash Ions</button>
            <button id="btnReset">Reset</button>
        </div>
        <div class="control-row">
            <div class="slider-group">
                <label for="kevSlider">Energy: <span id="kevValue">45</span> keV</label>
                <input type="range" id="kevSlider" min="1" max="200" value="45" step="1">
            </div>
            <div class="slider-group">
                <label for="timeSlider">Speed: <span id="timeValue">1.0</span>x</label>
                <input type="range" id="timeSlider" min="0.1" max="4.0" value="1.0" step="0.1">
            </div>
            <div id="playbackControls">
                <button class="pb-btn" id="btnStepBack" title="Step back [←]">⏮</button>
                <button class="pb-btn" id="btnPause" title="Pause / Play [Space]">⏸</button>
                <button class="pb-btn" id="btnStepFwd" title="Step forward [→]">⏭</button>
                <span id="stepIndicator"></span>
            </div>
            <div id="speedControls">
                <button class="speed-btn" data-speed="0.25">0.25x</button>
                <button class="speed-btn" data-speed="0.5">0.5x</button>
                <button class="speed-btn active" data-speed="1">1x</button>
                <button class="speed-btn" data-speed="2">2x</button>
                <button class="speed-btn" data-speed="4">4x</button>
            </div>
        </div>
        <div class="control-row">
            <div class="slider-group">
                <label for="deuAngleSlider">D Angle: <span id="deuAngleValue">0</span>&deg;</label>
                <input type="range" id="deuAngleSlider" min="0" max="359" value="0" step="1">
            </div>
            <div class="slider-group">
                <label for="triAngleSlider">T Angle: <span id="triAngleValue">0</span>&deg;</label>
                <input type="range" id="triAngleSlider" min="0" max="359" value="0" step="1">
            </div>
            <div class="slider-group">
                <label for="impactOffsetSlider">Impact Offset: <span id="impactOffsetValue">0.2</span></label>
                <input type="range" id="impactOffsetSlider" min="0" max="2.0" value="0.2" step="0.05">
            </div>
            <div class="slider-group" title="Peak magnetic field strength at the confinement boundary. Higher = tighter confinement for charged particles. Zero = no confinement.">
                <label for="bMaxSlider">B-Field: <span id="bMaxValue">3.0</span> T</label>
                <input type="range" id="bMaxSlider" min="0" max="10" value="3.0" step="0.1">
            </div>
        </div>
        <div class="control-row" style="border-top:1px solid #334155; padding-top:8px; margin-top:2px;">
            <span style="font-size:12px; color:#94a3b8; font-weight:600; letter-spacing:0.5px;">SLOW-MOTION REPLAY</span>
            <span style="font-size:11px; color:#64748b; margin-left:6px;">The sim auto-slows at key moments so you can watch the physics</span>
        </div>
        <div class="control-row slowdown-section">
            <div class="slowdown-group">
                <div class="slowdown-phase-label">
                    <span class="phase-icon" style="background:#3b82f6;"></span>
                    During Approach
                </div>
                <div class="slider-group" title="How close the ions need to be before slow-motion kicks in. Larger = starts slowing earlier.">
                    <label for="approachRangeSlider">Slow when within: <span id="approachRangeValue" class="slider-val">200</span>px</label>
                    <input type="range" id="approachRangeSlider" min="50" max="500" value="200" step="10">
                </div>
                <div class="slider-group" title="The slowest the simulation will go as ions get very close. Lower = more slow-mo detail.">
                    <label for="approachMinSlider">Slowest speed: <span id="approachMinValue" class="slider-val">0.5</span>%</label>
                    <input type="range" id="approachMinSlider" min="0.1" max="10" value="0.5" step="0.1">
                </div>
            </div>
            <div class="slowdown-group">
                <div class="slowdown-phase-label">
                    <span class="phase-icon" style="background:#22c55e;"></span>
                    At Fusion
                </div>
                <div class="slider-group" title="How slow the sim goes at the exact moment of fusion. Lower = longer slow-mo of the fusion event.">
                    <label for="fusionMinSlider">Slowest speed: <span id="fusionMinValue" class="slider-val">3</span>%</label>
                    <input type="range" id="fusionMinSlider" min="1" max="100" value="3" step="1">
                </div>
                <div class="slider-group" title="How quickly speed returns to normal after fusion. Higher = snaps back to real-time faster.">
                    <label for="fusionRecoverySlider">Resume speed: <span id="fusionRecoveryValue" class="slider-val">2</span></label>
                    <input type="range" id="fusionRecoverySlider" min="1" max="50" value="2" step="1">
                </div>
            </div>
        </div>
    </div>

    <canvas id="physicsCanvas" width="900" height="550"></canvas>

    <div id="legend">
        <div class="legend-item">
            <div class="legend-swatch" style="background:#ef4444;"></div>
            <span>Proton (P+)</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background:#3b82f6;"></div>
            <span>Neutron (N0)</span>
        </div>
        <div class="legend-item">
            <div class="legend-field" style="background:#22c55e;"></div>
            <span>Strong Force Field</span>
        </div>
        <div class="legend-item">
            <div class="legend-field" style="background:#ef4444;"></div>
            <span>Coulomb Field</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background:#a855f7;"></div>
            <span>Gamma Photon</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background:#facc15;"></div>
            <span>Alpha (⁴He)</span>
        </div>
        <div class="legend-item">
            <div class="legend-field" style="background:#3b82f6;"></div>
            <span>Magnetic Confinement (B⊙)</span>
        </div>
    </div>

    <div id="energyGraphContainer">
        <div id="energyGraphTitle">Particle Energy Readout</div>
        <canvas id="energyCanvas"></canvas>
        <div id="graphLegend"></div>
    </div>

    <script src="physics.js"></script>
    <script>
        const { Nucleon, Photon, rotateCluster, step: physicsStep, MAGNETIC_ZONE } = FusionPhysics;

        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');

        const sim = {
            nucleons: [],
            photons: [],
            deuteriumAssembled: false,
            tritiumAssembled: false,
            reactionTriggered: false,
            fusionOccurred: false,
            fusionSlowFactor: 1.0,
            timeScale: 1.0,
            currentKeV: 45,
            approachMinDt: 0.005,
            approachRange: 200,
            fusionMinDt: 0.03,
            fusionRecoveryRate: 0.002,
            impactOffset: 0.2,
            deuAngle: 0,
            triAngle: 0,
            paused: false,
            neutronEscaped: null,
            bMax: 3.0
        };

        const MAX_HISTORY = 2000;
        let stateHistory = [];
        let historyIndex = -1;

        function snapshotState() {
            return {
                nucleons: sim.nucleons.map(n => ({
                    type: n.type, x: n.x, y: n.y,
                    vx: n.vx, vy: n.vy, ax: n.ax, ay: n.ay,
                    old_ax: n.old_ax, old_ay: n.old_ay,
                    mass: n.mass, charge: n.charge, radius: n.radius,
                    color: n.color, isAlphaComponent: n.isAlphaComponent,
                    isEjectedNeutron: n.isEjectedNeutron, clusterType: n.clusterType
                })),
                photons: sim.photons.map(p => ({
                    x: p.x, y: p.y, vx: p.vx, vy: p.vy,
                    speed: p.speed, life: p.life, decay: p.decay
                })),
                fusionOccurred: sim.fusionOccurred,
                fusionSlowFactor: sim.fusionSlowFactor,
                reactionTriggered: sim.reactionTriggered
            };
        }

        function restoreSnapshot(snap) {
            sim.nucleons = snap.nucleons.map(s => {
                let n = new Nucleon(s.type, s.x, s.y, s.clusterType);
                n.vx = s.vx; n.vy = s.vy; n.ax = s.ax; n.ay = s.ay;
                n.old_ax = s.old_ax; n.old_ay = s.old_ay;
                n.mass = s.mass; n.charge = s.charge; n.radius = s.radius;
                n.color = s.color; n.isAlphaComponent = s.isAlphaComponent;
                n.isEjectedNeutron = s.isEjectedNeutron;
                return n;
            });
            sim.photons = snap.photons.map(s => {
                let p = new Photon(0, 0, 0);
                p.x = s.x; p.y = s.y; p.vx = s.vx; p.vy = s.vy;
                p.speed = s.speed; p.life = s.life; p.decay = s.decay;
                return p;
            });
            sim.fusionOccurred = snap.fusionOccurred;
            sim.fusionSlowFactor = snap.fusionSlowFactor;
            sim.reactionTriggered = snap.reactionTriggered;
        }

        function pushHistory() {
            if (historyIndex < stateHistory.length - 1) {
                stateHistory.length = historyIndex + 1;
            }
            stateHistory.push(snapshotState());
            if (stateHistory.length > MAX_HISTORY) stateHistory.shift();
            historyIndex = stateHistory.length - 1;
            updateStepIndicator();
        }

        function stepBack() {
            if (historyIndex <= 0) return;
            historyIndex--;
            restoreSnapshot(stateHistory[historyIndex]);
            redrawCanvas();
            updateStepIndicator();
        }

        function stepForward() {
            if (historyIndex < stateHistory.length - 1) {
                historyIndex++;
                restoreSnapshot(stateHistory[historyIndex]);
                redrawCanvas();
            } else {
                doOneStep();
            }
            updateStepIndicator();
        }

        function doOneStep() {
            lastStepInfo = physicsStep(sim, canvas.width, canvas.height);
            sim.photons = sim.photons.filter(p => p.life > 0);
            sim.photons.forEach(p => p.update(sim.timeScale));
            pushHistory();
        }

        function redrawCanvas() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawMagneticField();
            sim.nucleons.forEach(n => n.draw(ctx));
            sim.photons.forEach(p => p.draw(ctx));
            drawNeutronEscape();
            drawHUD();
        }

        let lastStepInfo = { dt: 1, adaptiveFactor: 1, minDist: Infinity };

        function drawMagneticField() {
            const Z = MAGNETIC_ZONE;
            const W = canvas.width;
            const H = canvas.height;
            ctx.save();

            let grad;
            grad = ctx.createLinearGradient(0, 0, Z, 0);
            grad.addColorStop(0, 'rgba(59, 130, 246, 0.22)');
            grad.addColorStop(0.6, 'rgba(59, 130, 246, 0.06)');
            grad.addColorStop(1, 'rgba(59, 130, 246, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, Z, H);

            grad = ctx.createLinearGradient(W, 0, W - Z, 0);
            grad.addColorStop(0, 'rgba(59, 130, 246, 0.22)');
            grad.addColorStop(0.6, 'rgba(59, 130, 246, 0.06)');
            grad.addColorStop(1, 'rgba(59, 130, 246, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(W - Z, 0, Z, H);

            grad = ctx.createLinearGradient(0, 0, 0, Z);
            grad.addColorStop(0, 'rgba(59, 130, 246, 0.22)');
            grad.addColorStop(0.6, 'rgba(59, 130, 246, 0.06)');
            grad.addColorStop(1, 'rgba(59, 130, 246, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, Z);

            grad = ctx.createLinearGradient(0, H, 0, H - Z);
            grad.addColorStop(0, 'rgba(59, 130, 246, 0.22)');
            grad.addColorStop(0.6, 'rgba(59, 130, 246, 0.06)');
            grad.addColorStop(1, 'rgba(59, 130, 246, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, H - Z, W, Z);

            ctx.strokeStyle = 'rgba(96, 165, 250, 0.18)';
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 10]);
            ctx.beginPath();
            ctx.rect(Z, Z, W - Z * 2, H - Z * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.font = '9px monospace';
            ctx.fillStyle = 'rgba(96, 165, 250, 0.35)';
            ctx.textAlign = 'center';
            ctx.fillText('B ⊙', Z / 2, H / 2 - 6);
            ctx.fillText('B ⊙', W - Z / 2, H / 2 - 6);
            ctx.fillText('B ⊙', W / 2, Z / 2 + 2);
            ctx.fillText('B ⊙', W / 2, H - Z / 2 + 2);

            ctx.restore();
        }

        function drawNeutronEscape() {
            if (!sim.neutronEscaped) return;
            let elapsed = Date.now() - sim.neutronEscaped.time;
            if (elapsed > 3000) { sim.neutronEscaped = null; return; }

            let alpha = 1 - (elapsed / 3000);
            let ex = sim.neutronEscaped.x;
            let ey = sim.neutronEscaped.y;

            ctx.save();

            let rippleR = 10 + elapsed * 0.06;
            ctx.beginPath();
            ctx.arc(ex, ey, rippleR, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(59, 130, 246, ${alpha * 0.5})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#60a5fa';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('n\u2070 escaped confinement', canvas.width / 2, canvas.height - 40);
            ctx.restore();
        }

        function drawHUD() {
            ctx.save();
            let hudH = sim.reactionTriggered ? 74 : 58;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
            ctx.fillRect(8, 8, 195, hudH);
            ctx.strokeStyle = '#334155';
            ctx.strokeRect(8, 8, 195, hudH);
            ctx.font = '12px monospace';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'left';
            ctx.fillText(`step: ${historyIndex} / ${stateHistory.length - 1}`, 16, 26);
            ctx.fillText(`particles: ${sim.nucleons.length}`, 16, 42);
            ctx.fillText(`state: ${sim.paused ? 'PAUSED' : 'RUNNING'}`, 16, 58);

            if (sim.reactionTriggered) {
                let pct = (lastStepInfo.adaptiveFactor * sim.fusionSlowFactor * 100);
                let barW = 130;
                let barX = 16;
                let barY = 66;

                ctx.fillStyle = '#1e293b';
                ctx.fillRect(barX, barY, barW, 8);

                let fillW = (pct / 100) * barW;
                let barColor = pct < 10 ? '#ef4444' : pct < 50 ? '#f59e0b' : '#22c55e';
                ctx.fillStyle = barColor;
                ctx.fillRect(barX, barY, fillW, 8);

                ctx.fillStyle = '#94a3b8';
                ctx.font = '10px monospace';
                ctx.fillText(`speed: ${pct.toFixed(1)}%`, barX + barW + 6, barY + 8);
            }

            ctx.restore();

            if (sim.paused) {
                ctx.save();
                ctx.fillStyle = 'rgba(180, 83, 9, 0.75)';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('⏸ PAUSED — use ← → to step', canvas.width / 2, canvas.height - 16);
                ctx.restore();
            }
        }

        function togglePause() {
            sim.paused = !sim.paused;
            const btn = document.getElementById('btnPause');
            btn.textContent = sim.paused ? '▶' : '⏸';
            btn.classList.toggle('active-pause', sim.paused);
            if (!sim.paused && historyIndex < stateHistory.length - 1) {
                stateHistory.length = historyIndex + 1;
            }
            updateStepIndicator();
        }

        function updateStepIndicator() {
            const el = document.getElementById('stepIndicator');
            if (stateHistory.length === 0) { el.textContent = ''; return; }
            el.textContent = `${historyIndex} / ${stateHistory.length - 1}`;
        }

        // --- Controls ---

        document.getElementById('kevSlider').addEventListener('input', (e) => {
            sim.currentKeV = parseFloat(e.target.value);
            document.getElementById('kevValue').innerText = sim.currentKeV;
        });

        const setTimeScale = (val) => {
            sim.timeScale = val;
            document.getElementById('timeSlider').value = val;
            document.getElementById('timeValue').innerText = val.toFixed(1);
            document.querySelectorAll('.speed-btn').forEach(b =>
                b.classList.toggle('active', parseFloat(b.dataset.speed) === val)
            );
        };
        document.getElementById('timeSlider').addEventListener('input', (e) => setTimeScale(parseFloat(e.target.value)));
        document.querySelectorAll('.speed-btn').forEach(b => b.addEventListener('click', () => setTimeScale(parseFloat(b.dataset.speed))));
        document.getElementById('btnReset').addEventListener('click', resetEngineEnvironment);

        document.getElementById('btnPause').addEventListener('click', togglePause);
        document.getElementById('btnStepBack').addEventListener('click', () => {
            if (!sim.paused) togglePause();
            stepBack();
        });
        document.getElementById('btnStepFwd').addEventListener('click', () => {
            if (!sim.paused) togglePause();
            stepForward();
        });

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); togglePause(); }
            if (e.code === 'ArrowLeft')  { e.preventDefault(); if (!sim.paused) togglePause(); stepBack(); }
            if (e.code === 'ArrowRight') { e.preventDefault(); if (!sim.paused) togglePause(); stepForward(); }
        });

        document.getElementById('approachMinSlider').addEventListener('input', (e) => {
            sim.approachMinDt = parseFloat(e.target.value) / 100;
            document.getElementById('approachMinValue').innerText = e.target.value;
        });
        document.getElementById('approachRangeSlider').addEventListener('input', (e) => {
            sim.approachRange = parseFloat(e.target.value);
            document.getElementById('approachRangeValue').innerText = e.target.value;
        });
        document.getElementById('fusionMinSlider').addEventListener('input', (e) => {
            sim.fusionMinDt = parseFloat(e.target.value) / 100;
            document.getElementById('fusionMinValue').innerText = e.target.value;
        });
        document.getElementById('fusionRecoverySlider').addEventListener('input', (e) => {
            sim.fusionRecoveryRate = parseFloat(e.target.value) / 1000;
            document.getElementById('fusionRecoveryValue').innerText = e.target.value;
        });

        document.getElementById('bMaxSlider').addEventListener('input', (e) => {
            sim.bMax = parseFloat(e.target.value);
            document.getElementById('bMaxValue').innerText = sim.bMax.toFixed(1);
        });

        document.getElementById('deuAngleSlider').addEventListener('input', (e) => {
            sim.deuAngle = parseFloat(e.target.value) * Math.PI / 180;
            document.getElementById('deuAngleValue').innerText = e.target.value;
            if (sim.deuteriumAssembled && !sim.reactionTriggered) {
                rotateCluster('D', 180, 275, sim.deuAngle, sim.nucleons);
            }
        });

        document.getElementById('triAngleSlider').addEventListener('input', (e) => {
            sim.triAngle = parseFloat(e.target.value) * Math.PI / 180;
            document.getElementById('triAngleValue').innerText = e.target.value;
            if (sim.tritiumAssembled && !sim.reactionTriggered) {
                rotateCluster('T', 720, 275, sim.triAngle, sim.nucleons);
            }
        });

        document.getElementById('impactOffsetSlider').addEventListener('input', (e) => {
            sim.impactOffset = parseFloat(e.target.value);
            document.getElementById('impactOffsetValue').innerText = sim.impactOffset.toFixed(2);
        });

        // --- Spawn & Launch ---

        document.getElementById('btnDeuterium').addEventListener('click', () => {
            if (sim.deuteriumAssembled) return;
            let cx = 180, cy = 275, r0 = 16.0;
            sim.nucleons.push(new Nucleon('proton', cx - r0, cy, 'D'), new Nucleon('neutron', cx + r0, cy, 'D'));
            sim.deuteriumAssembled = true;
            rotateCluster('D', cx, cy, sim.deuAngle, sim.nucleons);
            evalLaunchReady();
        });

        document.getElementById('btnTritium').addEventListener('click', () => {
            if (sim.tritiumAssembled) return;
            let cx = 720, cy = 275;
            let r_equil = 28.5;
            let h = r_equil * (Math.sqrt(3) / 2);
            sim.nucleons.push(
                new Nucleon('proton', cx, cy - (2 / 3) * h, 'T'),
                new Nucleon('neutron', cx - r_equil / 2, cy + (1 / 3) * h, 'T'),
                new Nucleon('neutron', cx + r_equil / 2, cy + (1 / 3) * h, 'T')
            );
            sim.tritiumAssembled = true;
            rotateCluster('T', cx, cy, sim.triAngle, sim.nucleons);
            evalLaunchReady();
        });

        document.getElementById('btnLaunch').addEventListener('click', () => {
            if (!sim.deuteriumAssembled || !sim.tritiumAssembled || sim.reactionTriggered) return;
            let computedVelocity = Math.sqrt(sim.currentKeV) * 0.38;
            sim.nucleons.forEach(n => {
                n.vx = (n.x < canvas.width / 2) ? computedVelocity : -computedVelocity;
                n.vy = (Math.random() - 0.5) * sim.impactOffset;
            });
            sim.reactionTriggered = true;
        });

        function evalLaunchReady() {
            if (sim.deuteriumAssembled && sim.tritiumAssembled) {
                document.getElementById('btnLaunch').disabled = false;
            }
        }

        function resetEngineEnvironment() {
            sim.nucleons = [];
            sim.photons = [];
            sim.deuteriumAssembled = false;
            sim.tritiumAssembled = false;
            sim.reactionTriggered = false;
            sim.fusionOccurred = false;
            sim.fusionSlowFactor = 1.0;
            sim.neutronEscaped = null;
            sim.paused = false;
            document.getElementById('btnLaunch').disabled = true;
            document.getElementById('btnPause').textContent = '⏸';
            document.getElementById('btnPause').classList.remove('active-pause');
            stateHistory = [];
            historyIndex = -1;
            updateStepIndicator();
            energyHistory = [];
            document.getElementById('graphLegend').innerHTML = '';
        }

        // --- Main Render Loop ---

        function mainSimulationEngine() {
            if (sim.paused) {
                requestAnimationFrame(mainSimulationEngine);
                return;
            }

            ctx.fillStyle = 'rgba(2, 6, 23, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMagneticField();

            if (sim.nucleons.length > 0) pushHistory();

            lastStepInfo = physicsStep(sim, canvas.width, canvas.height);

            sim.nucleons.forEach(n => n.draw(ctx));

            sim.photons = sim.photons.filter(p => p.life > 0);
            sim.photons.forEach(p => { p.update(sim.timeScale); p.draw(ctx); });

            drawNeutronEscape();
            drawHUD();

            requestAnimationFrame(mainSimulationEngine);
        }

        mainSimulationEngine();

        // --- Energy Graph ---

        const eCanvas = document.getElementById('energyCanvas');
        const eCtx = eCanvas.getContext('2d');
        const GRAPH_HISTORY = 300;
        const GRAPH_PAD = { top: 18, right: 14, bottom: 28, left: 56 };
        let energyHistory = [];
        let graphFrame = 0;

        const PARTICLE_COLORS = [
            '#f87171', '#60a5fa', '#34d399', '#fbbf24', '#a78bfa',
            '#fb923c', '#38bdf8', '#4ade80', '#facc15', '#c084fc'
        ];

        function resizeEnergyCanvas() {
            const rect = eCanvas.getBoundingClientRect();
            eCanvas.width = rect.width * devicePixelRatio;
            eCanvas.height = rect.height * devicePixelRatio;
            eCtx.scale(devicePixelRatio, devicePixelRatio);
        }
        resizeEnergyCanvas();
        window.addEventListener('resize', resizeEnergyCanvas);

        function getParticleLabel(n, idx) {
            if (n.isEjectedNeutron) return 'n (ejected)';
            if (n.isAlphaComponent) return (n.type === 'proton' ? 'P+' : 'N0') + ' (α)';
            let prefix = n.clusterType === 'D' ? 'D' : n.clusterType === 'T' ? 'T' : '';
            let symbol = n.type === 'proton' ? 'P+' : 'N0';
            return prefix ? `${prefix}-${symbol}` : `${symbol} #${idx + 1}`;
        }

        function sampleEnergies() {
            if (sim.nucleons.length === 0) return;
            let frame = [];
            sim.nucleons.forEach((n, i) => {
                frame.push({
                    ke: n.kineticEnergy(),
                    label: getParticleLabel(n, i),
                    color: PARTICLE_COLORS[i % PARTICLE_COLORS.length]
                });
            });
            energyHistory.push(frame);
            if (energyHistory.length > GRAPH_HISTORY) energyHistory.shift();
        }

        function formatEnergy(mev) {
            if (mev >= 1.0) {
                return `${mev.toFixed(1)} MeV`;
            } else {
                return `${(mev * 1000).toFixed(0)} keV`;
            }
        }

        function updateGraphLegend() {
            const container = document.getElementById('graphLegend');
            if (energyHistory.length === 0) { container.innerHTML = ''; return; }
            let last = energyHistory[energyHistory.length - 1];
            let html = '';
            last.forEach(p => {
                html += `<div class="graph-legend-item">
                    <div class="graph-legend-line" style="background:${p.color};"></div>
                    <span>${p.label}: <strong style="color:#e2e8f0">${formatEnergy(p.ke)}</strong></span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function drawEnergyGraph() {
            const w = eCanvas.getBoundingClientRect().width;
            const h = eCanvas.getBoundingClientRect().height;

            eCtx.clearRect(0, 0, w, h);

            const gw = w - GRAPH_PAD.left - GRAPH_PAD.right;
            const gh = h - GRAPH_PAD.top - GRAPH_PAD.bottom;

            let maxKE = 0.001;
            energyHistory.forEach(frame => {
                frame.forEach(p => { if (p.ke > maxKE) maxKE = p.ke; });
            });
            let graphInMeV = maxKE >= 1.0;
            if (graphInMeV) {
                maxKE = Math.ceil(maxKE / 2) * 2 || 2;
            } else {
                let keVMax = maxKE * 1000;
                keVMax = Math.ceil(keVMax / 10) * 10 || 10;
                maxKE = keVMax / 1000;
            }

            eCtx.save();
            eCtx.strokeStyle = 'rgba(51,65,85,0.35)';
            eCtx.lineWidth = 0.5;
            const yTicks = 5;
            for (let i = 0; i <= yTicks; i++) {
                let yy = GRAPH_PAD.top + (gh / yTicks) * i;
                eCtx.beginPath();
                eCtx.moveTo(GRAPH_PAD.left, yy);
                eCtx.lineTo(GRAPH_PAD.left + gw, yy);
                eCtx.stroke();

                eCtx.fillStyle = '#475569';
                eCtx.font = '10px monospace';
                eCtx.textAlign = 'right';
                eCtx.textBaseline = 'middle';
                let val = maxKE - (maxKE / yTicks) * i;
                let tickLabel = graphInMeV ? val.toFixed(1) : (val * 1000).toFixed(0);
                eCtx.fillText(tickLabel, GRAPH_PAD.left - 8, yy);
            }

            eCtx.save();
            eCtx.translate(14, GRAPH_PAD.top + gh / 2);
            eCtx.rotate(-Math.PI / 2);
            eCtx.fillStyle = '#475569';
            eCtx.font = '10px sans-serif';
            eCtx.textAlign = 'center';
            eCtx.fillText(graphInMeV ? 'KE (MeV)' : 'KE (keV)', 0, 0);
            eCtx.restore();

            eCtx.fillStyle = '#475569';
            eCtx.font = '10px sans-serif';
            eCtx.textAlign = 'center';
            eCtx.fillText('Time →', GRAPH_PAD.left + gw / 2, h - 4);

            eCtx.strokeStyle = '#334155';
            eCtx.lineWidth = 1;
            eCtx.beginPath();
            eCtx.moveTo(GRAPH_PAD.left, GRAPH_PAD.top);
            eCtx.lineTo(GRAPH_PAD.left, GRAPH_PAD.top + gh);
            eCtx.lineTo(GRAPH_PAD.left + gw, GRAPH_PAD.top + gh);
            eCtx.stroke();

            if (energyHistory.length < 2) { eCtx.restore(); return; }

            let numParticles = energyHistory[0].length;
            let step = gw / (GRAPH_HISTORY - 1);

            for (let p = 0; p < numParticles; p++) {
                eCtx.beginPath();
                eCtx.strokeStyle = energyHistory[0][p]?.color || '#888';
                eCtx.lineWidth = 2;
                eCtx.lineJoin = 'round';
                eCtx.lineCap = 'round';

                let started = false;
                for (let i = 0; i < energyHistory.length; i++) {
                    if (!energyHistory[i][p]) continue;
                    let xPos = GRAPH_PAD.left + (GRAPH_HISTORY - energyHistory.length + i) * step;
                    let yPos = GRAPH_PAD.top + gh - (energyHistory[i][p].ke / maxKE) * gh;
                    yPos = Math.max(GRAPH_PAD.top, Math.min(GRAPH_PAD.top + gh, yPos));
                    if (!started) { eCtx.moveTo(xPos, yPos); started = true; }
                    else eCtx.lineTo(xPos, yPos);
                }
                eCtx.stroke();

                if (energyHistory.length > 0 && energyHistory[energyHistory.length - 1][p]) {
                    let lastFrame = energyHistory[energyHistory.length - 1][p];
                    let xEnd = GRAPH_PAD.left + gw;
                    let yEnd = GRAPH_PAD.top + gh - (lastFrame.ke / maxKE) * gh;
                    yEnd = Math.max(GRAPH_PAD.top, Math.min(GRAPH_PAD.top + gh, yEnd));

                    eCtx.save();
                    eCtx.beginPath();
                    eCtx.arc(xEnd, yEnd, 4, 0, Math.PI * 2);
                    eCtx.fillStyle = lastFrame.color;
                    eCtx.shadowColor = lastFrame.color;
                    eCtx.shadowBlur = 8;
                    eCtx.fill();
                    eCtx.restore();
                }
            }
            eCtx.restore();

            graphFrame++;
            if (graphFrame % 15 === 0) updateGraphLegend();
        }

        function energyGraphLoop() {
            if (!sim.paused) sampleEnergies();
            drawEnergyGraph();
            requestAnimationFrame(energyGraphLoop);
        }
        energyGraphLoop();
    </script>
</body>
</html>
